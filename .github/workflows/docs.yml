name: Build and Deploy Code Docs

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'aift.py'
      - 'runtime_compat.py'
      - 'example_reports/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install project dependencies
        run: pip install -r requirements.txt

      - name: Install pdoc
        run: pip install pdoc

      - name: Build documentation
        run: pdoc app aift runtime_compat -o _site/docs --docformat google

      - name: Copy example reports
        run: cp -r example_reports _site/example_reports

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-docs:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
